name: data_capture_mvp
description: A production-ready MVP for data capture with mobile and web admin.
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.10
  image_picker: ^1.1.2
  video_player: ^2.9.2
  geolocator: ^13.0.2
  intl: ^0.19.0
  provider: ^6.1.2
  go_router: ^14.6.3
  google_maps_flutter: ^2.10.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.1
  image: ^4.3.0
  path_provider: ^2.1.5
  watermark_kit: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
